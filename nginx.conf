worker_processes auto;
events { worker_connections 1024; }

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=60r/m;

    # Hide nginx version
    server_tokens off;

    upstream flask_app {
        server nis2audit:5000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # TLS hardening
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         'ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:!aNULL:!MD5:!DSS';
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            "DENY"                               always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection           "1; mode=block"                      always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"                       always;
        add_header Cross-Origin-Resource-Policy "same-origin"                      always;

        # Rate limit login endpoint
        location /login {
            limit_req zone=login_zone burst=5 nodelay;
            proxy_pass         http://flask_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Rate limit API endpoints
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass         http://flask_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # All other routes
        location / {
            proxy_pass         http://flask_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;  # long timeout for audit jobs
            proxy_send_timeout 300s;
        }

        # Static files cached
        location /static/ {
            proxy_pass         http://flask_app;
            proxy_cache_valid  200 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
